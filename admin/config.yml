backend:
  name: github
  repo: nerd-heidi/portfolio
  branch: main
  base_url: https://purple-bread-aff9.heidiwish.workers.dev

media_folder: images
public_folder: /images

collections:

  - name: top
    label: "🏠 トップページ"
    files:
      - name: top_data
        label: トップページを編集
        file: _data/top.json
        format: json
        fields:
          - name: hero_image
            label: ヒーロー背景画像
            widget: image
          - name: cards
            label: カード（11枚）
            widget: list
            label_singular: カード
            fields:
              - {name: number, label: 番号, widget: string}
              - {name: title, label: タイトル, widget: string}
              - {name: description, label: 説明, widget: string}
              - {name: image, label: 画像, widget: image}
              - {name: url, label: リンク先, widget: string}
              - name: size
                label: サイズ
                widget: select
                options:
                  - {label: "通常", value: "regular"}
                  - {label: "大（2×2）", value: "large"}
                  - {label: "横長（2×1）", value: "wide"}

  - name: music
    label: "🎵 Favorite Music"
    files:
      - name: music_index
        label: ジャンル一覧（トップ）
        file: _data/music.json
        format: json
        fields:
          - name: genres
            label: ジャンル
            widget: list
            label_singular: ジャンル
            fields:
              - {name: id,          label: ID（英小文字）, widget: string}
              - {name: name,        label: ジャンル名,     widget: string}
              - {name: description, label: 説明,           widget: string}
              - {name: image,       label: 画像,           widget: image}
      - name: music_hiphop
        label: HIPHOP
        file: _data/music-hiphop.json
        format: json
        fields: &genre_fields
          - name: artists
            label: Favorite Artists
            widget: list
            label_singular: アーティスト
            fields:
              - {name: title,       label: アーティスト名, widget: string}
              - {name: description, label: 説明文,         widget: text}
              - {name: image,       label: 画像,           widget: image, required: false}
              - {name: tags,        label: タグ,           widget: list, field: {name: tag, label: タグ, widget: string}}
          - name: mvs
            label: Favorite MV
            widget: list
            label_singular: MV
            fields:
              - {name: title,       label: タイトル,       widget: string}
              - {name: youtube_id,  label: YouTube 動画ID, widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明・感想,     widget: text, required: false}
          - name: albums
            label: Favorite Albums
            widget: list
            label_singular: アルバム
            fields:
              - {name: title,       label: アルバム名,     widget: string}
              - {name: description, label: 説明・感想,     widget: text}
              - {name: image,       label: 画像,           widget: image, required: false}
              - {name: tags,        label: タグ,           widget: list, field: {name: tag, label: タグ, widget: string}}
      - name: music_rock
        label: Rock
        file: _data/music-rock.json
        format: json
        fields: *genre_fields
      - name: music_idol
        label: IDOL
        file: _data/music-idol.json
        format: json
        fields: *genre_fields
      - name: music_pops
        label: POPS
        file: _data/music-pops.json
        format: json
        fields: *genre_fields
      - name: music_other
        label: Other
        file: _data/music-other.json
        format: json
        fields: *genre_fields

  - name: beat
    label: "🎛 Beat"
    files:
      - name: beat_data
        label: コンテンツを編集
        file: _data/beat.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

