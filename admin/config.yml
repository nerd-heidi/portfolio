backend:
  name: github
  repo: nerd-heidi/portfolio
  branch: main
  base_url: https://purple-bread-aff9.heidiwish.workers.dev

media_folder: images
public_folder: /images

collections:

  - name: top
    label: "🏠 トップページ"
    files:
      - name: top_data
        label: トップページを編集
        file: _data/top.json
        format: json
        fields:
          - name: hero_image
            label: ヒーロー背景画像
            widget: image
          - name: cards
            label: カード（11枚）
            widget: list
            label_singular: カード
            fields:
              - {name: number, label: 番号, widget: string}
              - {name: title, label: タイトル, widget: string}
              - {name: description, label: 説明, widget: string}
              - {name: image, label: 画像, widget: image}
              - {name: url, label: リンク先, widget: string}
              - name: size
                label: サイズ
                widget: select
                options:
                  - {label: "通常", value: "regular"}
                  - {label: "大（2×2）", value: "large"}
                  - {label: "横長（2×1）", value: "wide"}

  - name: music
    label: "🎵 Favorite Music"
    files:
      - name: music_index
        label: ジャンル一覧（トップ）
        file: _data/music.json
        format: json
        fields:
          - name: genres
            label: ジャンル
            widget: list
            label_singular: ジャンル
            fields:
              - {name: id,          label: ID,         widget: hidden}
              - {name: name,        label: ジャンル名, widget: string}
              - {name: description, label: 説明,       widget: string}
              - {name: image,       label: 画像,       widget: image}
      - name: music_hiphop
        label: HIPHOP
        file: _data/music-hiphop.json
        format: json
        fields: &genre_fields
          - name: mvs
            label: Favorite Artists
            widget: list
            label_singular: MV
            fields:
              - {name: title,       label: タイトル,       widget: string}
              - {name: youtube_id,  label: YouTube 動画ID, widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明・感想,     widget: text, required: false}
      - name: music_rock
        label: Rock
        file: _data/music-rock.json
        format: json
        fields: *genre_fields
      - name: music_pops
        label: POPS
        file: _data/music-pops.json
        format: json
        fields: *genre_fields
      - name: music_other
        label: Other
        file: _data/music-other.json
        format: json
        fields: *genre_fields

  - name: beat
    label: "🎛 Beat"
    files:
      - name: beat_data
        label: コンテンツを編集
        file: _data/beat.json
        format: json
        fields:
          - name: beats
            label: ビート
            widget: list
            label_singular: ビート
            fields:
              - {name: title, label: タイトル, widget: string}
              - {name: audio, label: 音源ファイル (MP3/WAV), widget: file, media_folder: /audio, public_folder: /audio}

  - name: anime
    label: "📺 Anime"
    files:
      - name: anime_data
        label: コンテンツを編集
        file: _data/anime.json
        format: json
        fields:
          - name: items
            label: Favorite Anime
            widget: list
            label_singular: アニメ
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,   widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: photo
    label: "📷 My Photo"
    files:
      - name: photo_data
        label: コンテンツを編集
        file: _data/photo.json
        format: json
        fields:
          - name: photos
            label: 写真
            widget: list
            label_singular: 写真
            fields:
              - {name: image,   label: 画像,         widget: image}
              - {name: caption, label: キャプション, widget: string, required: false}

  - name: idol
    label: "⭐ Favorite Idol"
    files:
      - name: idol_data
        label: コンテンツを編集
        file: _data/idol.json
        format: json
        fields:
          - name: items
            label: Favorite Idol
            widget: list
            label_singular: アイドル
            fields:
              - {name: title,       label: タイトル,       widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,         widget: text, required: false}

  - name: work
    label: "💼 Work"
    files:
      - name: work_data
        label: コンテンツを編集
        file: _data/work.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: ai
    label: "🤖 AI"
    files:
      - name: ai_data
        label: コンテンツを編集
        file: _data/ai.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: book
    label: "📚 Favorite Book"
    files:
      - name: book_data
        label: コンテンツを編集
        file: _data/book.json
        format: json
        fields:
          - name: items
            label: Favorite Books
            widget: list
            label_singular: 本
            fields:
              - {name: title, label: タイトル,   widget: string}
              - {name: image, label: 表紙画像, widget: image, required: false}
              - {name: url,   label: リンク先URL, widget: string, required: false, hint: "公式サイト・Amazonなど"}

  - name: game
    label: "🎮 Game"
    files:
      - name: game_data
        label: コンテンツを編集
        file: _data/game.json
        format: json
        fields:
          - name: items
            label: Favorite Games
            widget: list
            label_singular: ゲーム
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: movie
    label: "🎬 Movie"
    files:
      - name: movie_data
        label: コンテンツを編集
        file: _data/movie.json
        format: json
        fields:
          - name: items
            label: Favorite Movies
            widget: list
            label_singular: 映画
            fields:
              - {name: title, label: タイトル,   widget: string}
              - {name: image, label: ポスター画像, widget: image, required: false}
              - {name: url,   label: リンク先URL, widget: string, required: false, hint: "公式サイト・Filmarksなど"}

  - name: food
    label: "🍜 Food"
    files:
      - name: food_data
        label: コンテンツを編集
        file: _data/food.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: youtube
    label: "▶️ YouTube"
    files:
      - name: youtube_data
        label: コンテンツを編集
        file: _data/youtube.json
        format: json
        fields:
          - name: items
            label: YouTube 動画
            widget: list
            label_singular: 動画
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: cm
    label: "🎥 CM"
    files:
      - name: cm_data
        label: コンテンツを編集
        file: _data/cm.json
        format: json
        fields:
          - name: items
            label: CM 動画
            widget: list
            label_singular: CM
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}
