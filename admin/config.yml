backend:
  name: github
  repo: nerd-heidi/portfolio
  branch: main
  base_url: https://purple-bread-aff9.heidiwish.workers.dev

media_folder: images
public_folder: /images

collections:

  - name: top
    label: "🏠 トップページ"
    files:
      - name: top_data
        label: トップページを編集
        file: _data/top.json
        format: json
        fields:
          - name: hero_image
            label: ヒーロー背景画像
            widget: image
          - name: cards
            label: カード（11枚）
            widget: list
            label_singular: カード
            fields:
              - {name: number, label: 番号, widget: string}
              - {name: title, label: タイトル, widget: string}
              - {name: description, label: 説明, widget: string}
              - {name: image, label: 画像, widget: image}
              - {name: url, label: リンク先, widget: string}
              - name: size
                label: サイズ
                widget: select
                options:
                  - {label: "通常", value: "regular"}
                  - {label: "大（2×2）", value: "large"}
                  - {label: "横長（2×1）", value: "wide"}

  - name: music
    label: "🎵 Favorite Music"
    files:
      - name: music_index
        label: ジャンル一覧（トップ）
        file: _data/music.json
        format: json
        fields:
          - name: genres
            label: ジャンル
            widget: list
            label_singular: ジャンル
            fields:
              - {name: id,          label: ID,         widget: hidden}
              - {name: name,        label: ジャンル名, widget: string}
              - {name: description, label: 説明,       widget: string}
              - {name: image,       label: 画像,       widget: image}
      - name: music_hiphop
        label: HIPHOP
        file: _data/music-hiphop.json
        format: json
        fields: &genre_fields
          - name: mvs
            label: Favorite Artists
            widget: list
            label_singular: MV
            fields:
              - {name: title,       label: タイトル,       widget: string}
              - {name: youtube_id,  label: YouTube 動画ID, widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明・感想,     widget: text, required: false}
      - name: music_rock
        label: Rock
        file: _data/music-rock.json
        format: json
        fields: *genre_fields
      - name: music_pops
        label: POPS
        file: _data/music-pops.json
        format: json
        fields: *genre_fields
      - name: music_other
        label: Other
        file: _data/music-other.json
        format: json
        fields: *genre_fields

  - name: playlist
    label: "🎧 Playlist"
    files:
      - name: playlist_data
        label: コンテンツを編集
        file: _data/playlist.json
        format: json
        fields:
          - name: playlists
            label: プレイリスト
            widget: list
            label_singular: プレイリスト
            fields:
              - {name: title,       label: タイトル,              widget: string}
              - {name: description, label: 説明文,                widget: text, required: false}
              - {name: artwork,     label: アートワーク画像,      widget: image, required: false}
              - {name: url,         label: Apple Music URL,       widget: string, hint: "https://music.apple.com/jp/playlist/..."}

  - name: beat
    label: "🎛 Beat"
    files:
      - name: beat_data
        label: コンテンツを編集
        file: _data/beat.json
        format: json
        fields:
          - name: beats
            label: ビート
            widget: list
            label_singular: ビート
            fields:
              - {name: title, label: タイトル, widget: string}
              - {name: audio, label: 音源ファイル (MP3/WAV), widget: file, media_folder: /audio, public_folder: /audio}

  - name: anime
    label: "📺 Anime"
    files:
      - name: anime_data
        label: コンテンツを編集
        file: _data/anime.json
        format: json
        fields:
          - name: items
            label: Favorite Anime
            widget: list
            label_singular: アニメ
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,   widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: photo
    label: "📷 My Photo"
    files:
      - name: photo_data
        label: コンテンツを編集
        file: _data/photo.json
        format: json
        fields:
          - name: photos
            label: 写真
            widget: list
            label_singular: 写真
            fields:
              - {name: image,   label: 画像,         widget: image}
              - {name: caption, label: キャプション, widget: string, required: false}

  - name: idol
    label: "⭐ Favorite Idol"
    files:
      - name: idol_data
        label: コンテンツを編集
        file: _data/idol.json
        format: json
        fields:
          - name: items
            label: Favorite Idol
            widget: list
            label_singular: アイドル
            fields:
              - {name: title,       label: タイトル,       widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,         widget: text, required: false}

  - name: work
    label: "💼 Work"
    files:
      - name: work_data
        label: コンテンツを編集
        file: _data/work.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: ai
    label: "🤖 AI"
    files:
      - name: ai_data
        label: コンテンツを編集
        file: _data/ai.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: book
    label: "📚 Favorite Book"
    files:
      - name: book_data
        label: コンテンツを編集
        file: _data/book.json
        format: json
        fields:
          - name: items
            label: Favorite Books
            widget: list
            label_singular: 本
            fields:
              - {name: title, label: タイトル,   widget: string}
              - {name: image, label: 表紙画像, widget: image, required: false}
              - {name: url,   label: リンク先URL, widget: string, required: false, hint: "公式サイト・Amazonなど"}

  - name: game
    label: "🎮 Game"
    files:
      - name: game_data
        label: コンテンツを編集
        file: _data/game.json
        format: json
        fields:
          - name: items
            label: Favorite Games
            widget: list
            label_singular: ゲーム
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: movie
    label: "🎬 Movie"
    files:
      - name: movie_data
        label: コンテンツを編集
        file: _data/movie.json
        format: json
        fields:
          - name: items
            label: Favorite Movies
            widget: list
            label_singular: 映画
            fields:
              - {name: title, label: タイトル,   widget: string}
              - {name: image, label: ポスター画像, widget: image, required: false}
              - {name: url,   label: リンク先URL, widget: string, required: false, hint: "公式サイト・Filmarksなど"}

  - name: food
    label: "🍜 Food"
    files:
      - name: food_data
        label: コンテンツを編集
        file: _data/food.json
        format: json
        fields:
          - name: sections
            label: セクション
            widget: list
            label_singular: セクション
            fields:
              - {name: heading, label: 見出し, widget: string}
              - name: items
                label: アイテム
                widget: list
                label_singular: アイテム
                fields:
                  - {name: title,       label: タイトル,   widget: string}
                  - {name: description, label: 説明文,     widget: text}
                  - {name: image,       label: 画像,       widget: image, required: false}
                  - {name: tags,        label: タグ,       widget: list, allow_add: true, field: {name: tag, label: タグ, widget: string}}

  - name: mv_roulette
    label: "🎬 MV ルーレット"
    files:
      - name: mv_roulette_data
        label: MV ルーレットを編集
        file: _data/mv-roulette.json
        format: json
        fields:
          - name: items
            label: MV リスト
            widget: list
            label_singular: MV
            summary: "{{fields.title}} / {{fields.artist}}"
            fields:
              - {name: title,      label: 曲名,            widget: string}
              - {name: artist,     label: アーティスト名,  widget: string}
              - {name: youtube_id, label: YouTube 動画ID,  widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}

  - name: picks
    label: "🎵 新譜ピックアップ"
    files:
      - name: picks_data
        label: ピックアップを編集
        file: _data/picks.json
        format: json
        fields:
          - name: issues
            label: 号一覧
            widget: list
            label_singular: 号
            summary: "{{fields.title}}"
            fields:
              - {name: id,    label: "ID (例: 2026-06)",      widget: string, hint: "年月をハイフンでつないだ形式（例: 2026-06）"}
              - {name: title, label: "タイトル (例: 2026年6月号)", widget: string}
              - name: items
                label: 楽曲・MV
                widget: list
                label_singular: エントリー
                summary: "{{fields.artist}} — {{fields.track_title}}"
                fields:
                  - {name: track_title,      label: 曲名,              widget: string,   required: false}
                  - {name: artist,           label: アーティスト,       widget: string}
                  - name: genres
                    label: ジャンル
                    widget: select
                    multiple: true
                    required: false
                    options:
                      - {label: "J-Pop",       value: "j-pop"}
                      - {label: "Hip-Hop",     value: "hip-hop"}
                      - {label: "R&B",         value: "r-b"}
                      - {label: "Rock",        value: "rock"}
                      - {label: "Electronic",  value: "electronic"}
                      - {label: "Idol",        value: "idol"}
                      - {label: "Anime",       value: "anime"}
                      - {label: "その他",      value: "other"}
                  - {name: apple_music_url, label: "Apple Music URL", widget: string, required: false, hint: "Apple MusicのシェアURL"}
                  - {name: youtube_id,      label: "YouTube ID",      widget: string, required: false, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
                  - {name: comment,         label: "コメント",         widget: text,   required: false}
                  - name: character
                    label: キャラクター
                    widget: select
                    required: false
                    default: "melody"
                    options:
                      - {label: "Melody", value: "melody"}
                      - {label: "Seeno",  value: "seeno"}

  - name: youtube
    label: "▶️ YouTube"
    files:
      - name: youtube_data
        label: コンテンツを編集
        file: _data/youtube.json
        format: json
        fields:
          - name: items
            label: YouTube 動画
            widget: list
            label_singular: 動画
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}

  - name: cm
    label: "🎥 CM"
    files:
      - name: cm_data
        label: コンテンツを編集
        file: _data/commercial.json
        format: json
        fields:
          - name: items
            label: CM 動画
            widget: list
            label_singular: CM
            fields:
              - {name: title,       label: タイトル,        widget: string}
              - {name: youtube_id,  label: YouTube動画ID,  widget: string, hint: "URLの ?v= 以降（例: dQw4w9WgXcQ）"}
              - {name: description, label: 説明文,          widget: text, required: false}
