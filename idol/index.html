  <script src="/anime-render.js"></script>

  <script>
    // anime-render.js の renderAnimePage を idol 用に流用
    (async function() {
      const container = document.querySelector('.page-content');
      if (!container) return;
      let data;
      try {
        const res = await fetch('/_data/idol.json');
        if (!res.ok) throw new Error(res.statusText);
        data = await res.json();
      } catch {
        container.innerHTML = '<p class="loading-state">読み込みに失敗しました。</p>';
        return;
      }
      const items = data.items || [];
      if (items.length === 0) {
        container.innerHTML = '<p class="loading-state">コンテンツがありません。</p>';
        return;
      }
      function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
      const cardsHTML = items.map(item => {
        const vid = esc((item.youtube_id || '').split('&')[0]);
        if (!vid) return '';
        return `<div class="mv-card"><div class="mv-embed"><div class="yt-facade" data-id="${vid}"><img src="https://img.youtube.com/vi/${vid}/hqdefault.jpg" alt="${esc(item.title)}" loading="lazy"><button class="yt-play" aria-label="再生"></button></div></div><div class="mv-info"><h3>${esc(item.title)}</h3>${item.description ? `<p>${esc(item.description)}</p>` : ''}</div></div>`;
      }).join('');
      container.innerHTML = `<section class="content-section"><h2 class="section-heading">Favorite Idol</h2><div class="mv-grid">${cardsHTML}</div></section>`;
      container.querySelectorAll('.mv-card').forEach(c => {
        const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { c.classList.add('visible'); obs.unobserve(c); } }, { threshold: 0.1 });
        obs.observe(c);
      });
    })();
  </script>
