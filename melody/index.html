<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Companions – Melody & Seeno | NERD Life</title>
  <meta name="description" content="MelodyとSeeno、2人のAIミュージックコンパニオンのキャラクタープロフィール。" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ===== BASE ===== */
    .comp-main { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

    /* ===== HERO ===== */
    .comp-hero {
      text-align: center;
      padding: 80px 24px 56px;
      position: relative;
    }
    .comp-hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.14);
      color: rgba(255,255,255,.5); font-size: 11px; font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
    }
    .comp-hero-title {
      font-size: clamp(48px,8vw,96px); font-weight: 900;
      letter-spacing: -3px; line-height: 1; margin: 0 0 16px;
    }
    .comp-hero-m { color: #c9a8ff; }
    .comp-hero-amp { color: rgba(255,255,255,.22); margin: 0 16px; }
    .comp-hero-s { color: #D6C5B4; }
    .comp-hero-sub {
      font-size: 15px; color: rgba(255,255,255,.4);
      letter-spacing: .06em; margin: 0 0 44px;
    }
    .comp-hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .comp-btn {
      display: inline-flex; align-items: center; gap: 8px;
      border: none; border-radius: 100px; padding: 13px 26px;
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: transform .2s, box-shadow .2s; text-decoration: none;
    }
    .comp-btn:hover { transform: translateY(-3px); }
    .comp-btn-m { background: linear-gradient(135deg,#a780ff,#6a4ecf); color: #fff; box-shadow: 0 4px 20px rgba(167,128,255,.4); }
    .comp-btn-m:hover { box-shadow: 0 8px 28px rgba(167,128,255,.55); }
    .comp-btn-s { background: linear-gradient(135deg,#A68D72,#665C50); color: #fff; box-shadow: 0 4px 20px rgba(166,141,114,.35); }
    .comp-btn-s:hover { box-shadow: 0 8px 28px rgba(166,141,114,.5); }

    /* ===== SECTION DIVIDER ===== */
    .char-section { padding: 80px 0; border-top: 1px solid rgba(255,255,255,.07); }

    /* ===== SECTION HEADER ===== */
    .char-sec-header {
      display: flex; align-items: center; gap: 20px; margin-bottom: 56px;
    }
    .char-sec-badge {
      font-size: 10px; font-weight: 800; letter-spacing: .16em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 4px;
    }
    .m-badge { background: rgba(167,128,255,.2); color: #a780ff; }
    .s-badge { background: rgba(166,141,114,.2); color: #A68D72; }
    .char-sec-name {
      font-size: clamp(36px,5vw,64px); font-weight: 900;
      letter-spacing: -2px; line-height: 1;
    }
    .char-sec-name.m { color: #c9a8ff; }
    .char-sec-name.s { color: #D6C5B4; }
    .char-sec-tagline {
      font-size: 13px; color: rgba(255,255,255,.4);
      font-style: italic; margin-top: 4px;
    }

    /* ===== MAIN LAYOUT ===== */
    .char-main {
      display: grid; grid-template-columns: 520px 1fr; gap: 48px;
      align-items: start; margin-bottom: 64px;
    }
    .char-main.reverse { grid-template-columns: 1fr 520px; }
    .char-main.reverse .char-img-col { order: 2; }
    .char-main.reverse .char-data-col { order: 1; }

    .char-img-col { position: relative; }
    .char-img-col img {
      width: 100%; border-radius: 24px;
      filter: drop-shadow(0 12px 40px rgba(0,0,0,.6));
    }
    .char-img-caption {
      display: flex; gap: 6px; margin-top: 12px; justify-content: center;
    }
    .char-img-label {
      font-size: 10px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; padding: 4px 12px; border-radius: 4px;
      color: rgba(255,255,255,.45); border: 1px solid rgba(255,255,255,.1);
    }

    /* ===== DATA COL ===== */
    .char-catchphrase {
      font-size: clamp(16px,2vw,22px); font-weight: 700;
      line-height: 1.7; margin: 0 0 28px; color: rgba(255,255,255,.85);
    }

    .char-features { list-style: none; padding: 0; margin: 0 0 32px; display: flex; flex-direction: column; gap: 12px; }
    .char-feature {
      display: flex; align-items: center; gap: 12px;
      font-size: 14px; color: rgba(255,255,255,.75); font-weight: 500;
    }
    .char-feature-icon {
      width: 34px; height: 34px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .m-icon-bg { background: rgba(167,128,255,.15); }
    .s-icon-bg { background: rgba(166,141,114,.15); }

    /* ===== ABOUT ===== */
    .char-about-block {
      border-radius: 16px; padding: 24px; margin: 0 0 24px;
    }
    .m-about { background: rgba(167,128,255,.07); border: 1px solid rgba(167,128,255,.16); }
    .s-about { background: rgba(166,141,114,.07); border: 1px solid rgba(166,141,114,.16); }
    .char-about-title {
      font-size: 11px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; margin: 0 0 12px;
    }
    .m-about .char-about-title { color: #a780ff; }
    .s-about .char-about-title { color: #A68D72; }
    .char-about-text {
      font-size: 14px; color: rgba(255,255,255,.7); line-height: 1.9; margin: 0;
    }

    /* ===== PROFILE ===== */
    .char-profile-block {
      border-radius: 16px; padding: 20px; margin: 0 0 24px;
    }
    .m-profile { background: rgba(167,128,255,.05); border: 1px solid rgba(167,128,255,.14); }
    .s-profile { background: rgba(166,141,114,.05); border: 1px solid rgba(166,141,114,.14); }
    .profile-block-title {
      font-size: 11px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; margin: 0 0 14px;
    }
    .m-profile .profile-block-title { color: #a780ff; }
    .s-profile .profile-block-title { color: #A68D72; }
    .profile-row { display: flex; gap: 14px; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 13px; }
    .profile-row:last-child { border-bottom: none; }
    .profile-key { width: 72px; flex-shrink: 0; color: rgba(255,255,255,.35); font-size: 11px; }
    .profile-val { color: rgba(255,255,255,.82); line-height: 1.7; }

    /* ===== EXPRESSIONS ===== */
    .section-label {
      font-size: 11px; font-weight: 800; letter-spacing: .16em;
      text-transform: uppercase; margin: 0 0 20px;
    }
    .m-label { color: #a780ff; }
    .s-label { color: #A68D72; }

    .expressions-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 56px; }
    .exp-card {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 16px 14px; border-radius: 14px;
      min-width: 90px; flex: 1; max-width: 120px;
      transition: transform .2s;
    }
    .exp-card:hover { transform: translateY(-4px); }
    .m-exp { background: rgba(167,128,255,.08); border: 1px solid rgba(167,128,255,.2); }
    .s-exp { background: rgba(166,141,114,.08); border: 1px solid rgba(166,141,114,.2); }
    .exp-face { font-size: 28px; }
    .exp-name { font-size: 11px; color: rgba(255,255,255,.6); text-align: center; font-weight: 600; }

    /* ===== DETAILS GRID ===== */
    .details-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 48px; }
    .detail-card {
      border-radius: 16px; padding: 20px 14px; text-align: center;
      transition: transform .2s;
    }
    .detail-card:hover { transform: translateY(-4px); }
    .s-detail { background: rgba(166,141,114,.07); border: 1px solid rgba(166,141,114,.18); }
    .detail-icon { font-size: 28px; display: block; margin-bottom: 10px; }
    .detail-name { font-size: 11px; color: rgba(255,255,255,.55); line-height: 1.5; }

    /* ===== ITEMS GRID ===== */
    .items-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 48px; }
    .item-card {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-radius: 12px; font-size: 13px;
      color: rgba(255,255,255,.65);
    }
    .s-item { background: rgba(166,141,114,.08); border: 1px solid rgba(166,141,114,.18); }
    .item-icon { font-size: 20px; }

    /* ===== MOOD BOARD ===== */
    .mood-board { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 48px; }
    .mood-tag {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      background: rgba(166,141,114,.1); border: 1px solid rgba(166,141,114,.25);
      color: #D6C5B4; font-weight: 600;
    }

    /* ===== CHAT EXAMPLE ===== */
    .chat-block {
      border-radius: 20px; padding: 24px; margin-bottom: 48px;
      max-width: 520px;
    }
    .m-chat { background: rgba(167,128,255,.06); border: 1px solid rgba(167,128,255,.16); }
    .s-chat { background: rgba(166,141,114,.06); border: 1px solid rgba(166,141,114,.16); }
    .chat-block-title {
      font-size: 11px; font-weight: 800; letter-spacing: .14em;
      text-transform: uppercase; margin: 0 0 16px;
    }
    .m-chat .chat-block-title { color: #a780ff; }
    .s-chat .chat-block-title { color: #A68D72; }
    .chat-msgs { display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 82%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.65; }
    .chat-bot-m { background: rgba(167,128,255,.14); border: 1px solid rgba(167,128,255,.22); color: #f0eaff; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-user-m { background: rgba(167,128,255,.32); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-bot-s { background: rgba(166,141,114,.14); border: 1px solid rgba(166,141,114,.22); color: #f0ebe3; align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-user-s { background: rgba(166,141,114,.32); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-playlist {
      margin-top: 8px; padding: 12px 14px; border-radius: 10px;
      font-size: 12px; line-height: 1.9;
    }
    .m-playlist { background: rgba(167,128,255,.18); color: #d4baff; }
    .s-playlist { background: rgba(166,141,114,.18); color: #D6C5B4; }
    .chat-playlist-title { font-weight: 700; margin-bottom: 4px; }

    /* ===== COLOR PALETTE ===== */
    .palette-row { display: flex; gap: 0; border-radius: 12px; overflow: hidden; margin-bottom: 48px; }
    .palette-swatch { flex: 1; height: 52px; position: relative; cursor: default; transition: flex .2s; }
    .palette-swatch:hover { flex: 2; }
    .palette-hex {
      position: absolute; bottom: 6px; left: 0; right: 0;
      text-align: center; font-size: 9px; color: rgba(255,255,255,.5);
      font-weight: 700; letter-spacing: .04em;
    }

    /* ===== TWO-COL LAYOUT (about + chat) ===== */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 48px; }

    /* ===== DIVIDER ===== */
    .char-divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);
      margin: 64px 0;
    }

    /* ===== CTA ===== */
    .comp-cta {
      padding: 80px 24px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,.07);
    }
    .comp-cta-quote { font-size: 14px; color: rgba(255,255,255,.32); font-style: italic; margin: 0 0 8px; }
    .comp-cta-title { font-size: clamp(22px,3.5vw,38px); font-weight: 900; letter-spacing: -1px; margin: 0 0 32px; }

    /* ===== CHAR SHEET IMAGE ===== */
    .char-sheet-img { text-align: center; margin-bottom: 48px; }
    .char-sheet-img img {
      max-width: 1100px; width: 100%; border-radius: 20px;
      filter: drop-shadow(0 16px 48px rgba(0,0,0,.65));
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 900px) {
      .char-main { grid-template-columns: 1fr; }
      .char-main.reverse .char-img-col { order: 1; }
      .char-main.reverse .char-data-col { order: 2; }
      .char-img-col img { max-width: 320px; margin: 0 auto; display: block; }
      .two-col { grid-template-columns: 1fr; }
      .details-grid { grid-template-columns: repeat(2,1fr); }
    }
    @media (max-width: 600px) {
      .comp-hero-btns { flex-direction: column; align-items: center; }
      .details-grid { grid-template-columns: repeat(2,1fr); }
      .expressions-row { gap: 8px; }
      .exp-card { min-width: 70px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="logo" href="/">NERD Life</a>
    <nav>
      <a href="/favorite-music/">Music</a>
      <a href="/beat/">Beat</a>
      <a href="/anime/">Anime</a>
      <a href="/work/">Work</a>
      <a href="/ai/">AI</a>
    </nav>
    <button class="menu-toggle" aria-label="メニュー" aria-expanded="false"><span></span><span></span><span></span></button>
  </header>

  <main>
    <!-- ── HERO ── -->
    <div class="comp-hero">
      <span class="comp-hero-badge">✦ AI COMPANIONS</span>
      <h1 class="comp-hero-title">
        <span class="comp-hero-m">Melody</span>
        <span class="comp-hero-amp">&amp;</span>
        <span class="comp-hero-s">Seeno</span>
      </h1>
      <p class="comp-hero-sub">Your AI Music Companions</p>
      <div class="comp-hero-btns">
        <button class="comp-btn comp-btn-m" onclick="var t=document.getElementById('chatbot-toggle');if(t)t.click();">🎵 Melodyと話す</button>
        <button class="comp-btn comp-btn-s" onclick="var t=document.getElementById('chatbot-seeno-toggle');if(t)t.click();">🎧 Seenoと話す</button>
      </div>
    </div>

    <!-- ════════════════════════════════════════
         MELODY SECTION
    ════════════════════════════════════════ -->
    <section class="char-section">
      <div class="comp-main">
        <div class="char-sec-header">
          <span class="char-sec-badge m-badge">AI BOT</span>
          <div>
            <div class="char-sec-name m">Melody</div>
            <div class="char-sec-tagline">Your AI Music Companion</div>
          </div>
        </div>
        <div class="char-sheet-img">
          <img src="/images/Melody2.png" alt="Melody キャラクターシート" />
        </div>
      </div>
    </section>

    <!-- ════════════════════════════════════════
         SEENO SECTION
    ════════════════════════════════════════ -->
    <section class="char-section">
      <div class="comp-main">
        <div class="char-sec-header">
          <span class="char-sec-badge s-badge">AI MUSIC COMPANION</span>
          <div>
            <div class="char-sec-name s">Seeno</div>
            <div class="char-sec-tagline">Music is my escape.</div>
          </div>
        </div>
        <div class="char-sheet-img">
          <img src="/images/Seeno2.png" alt="Seeno キャラクターシート" />
        </div>
      </div>
    </section>

    <!-- ── CTA ── -->
    <div class="comp-cta">
      <p class="comp-cta-quote">Good Music, Good Day. — Music is my escape.</p>
      <h2 class="comp-cta-title">どちらに話しかける？</h2>
      <div class="comp-hero-btns">
        <button class="comp-btn comp-btn-m" onclick="var t=document.getElementById('chatbot-toggle');if(t)t.click();">🎵 Melodyと話す</button>
        <button class="comp-btn comp-btn-s" onclick="var t=document.getElementById('chatbot-seeno-toggle');if(t)t.click();">🎧 Seenoと話す</button>
      </div>
    </div>

  </main>

  <footer><p>© 2026 NERD Life. All Rights Reserved.</p></footer>

  <script src="/script.js"></script>
  <script src="/chatbot.js"></script>
  <script src="/chatbot-seeno.js"></script>
</body>
</html>
