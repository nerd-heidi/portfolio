<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist | NERD Life</title>
  <meta name="description" content="Apple Music で公開しているプレイリストのアートワークギャラリー。" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    /* ── ギャラリーグリッド ── */
    .playlist-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
      padding: 2rem 0;
    }

    /* ── カード ── */
    .playlist-card {
      display: flex;
      flex-direction: column;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      color: inherit;
    }

    .playlist-card__cover {
      display: block;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .playlist-card__cover:hover { opacity: 0.85; }

    /* ── アートワーク モザイク ── */
    .pl-mosaic {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: grid;
      overflow: hidden;
    }

    /* 1 枚：全面 */
    .pl-mosaic--1col {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    /* 2〜4 枚：2×2 */
    .pl-mosaic--2col {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    .pl-mosaic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* プレースホルダー */
    .pl-mosaic--empty {
      grid-template-columns: 1fr;
      background: #1c1c1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      color: #444;
    }

    /* ── カード本文 ── */
    .playlist-card__body {
      padding: 1rem 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      flex: 1;
    }

    .playlist-card__title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      margin: 0;
    }

    .playlist-card__desc {
      font-size: 0.8rem;
      color: #999;
      margin: 0;
      line-height: 1.5;
    }

    .playlist-card__badge {
      margin-top: auto;
      padding-top: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: #fc3c44;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-decoration: none;
    }
    .playlist-card__badge:hover { text-decoration: underline; }

    .playlist-card__badge svg {
      width: 14px;
      height: 14px;
      fill: #fc3c44;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

    <nav>
      <a href="/favorite-music/">Music</a>
